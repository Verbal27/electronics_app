<div class="review-card d-flex border-bottom flex-column p-2">
    <div class="d-flex justify-content-between w-100">
        <div class="d-flex">
            <div class="review-user-image">
                <img src="{{ review.user.image }}">
            </div>
            <div class="d-flex flex-column">
                <div class="d-flex gap-2">
                    <div class="fw-semibold">
                        {{ review.user.first_name }}
                    </div>
                    <div class="fw-semibold">
                        {{ review.user.last_name }}
                    </div>
                </div>
                <div class="d-flex gap-2 align-items-baseline">
                    <div class="d-flex text-warning fs-8">
                        {% for _ in review.stars %}
                            <i class="fas fa-star"></i>
                        {% endfor %}
                        {% for _ in review.empty_stars %}
                            <i class="fa-regular fa-star"></i>
                        {% endfor %}
                    </div>
                    <div class="d-flex fs-8 text-light-gray">
                        {{ review.time_since }} ago
                    </div>
                </div>
            </div>
        </div>
        {% if review.verified_purchase %}
            <div class="d-flex border border-0 h-100 px-2 py-1 bg-light-green text-light-green rounded-5 align-items-center fs-9">
                Verified purchase
            </div>
        {% else %}
            <div class="d-flex border border-0 h-100 px-2 py-1 bg-fourth text-danger rounded-5 align-items-center fs-9">
                Not verified
            </div>
        {% endif %}
    </div>
    <div class="d-flex mt-3 mb-4">
        {{ review.text }}
    </div>
</div>
